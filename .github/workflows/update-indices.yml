name: Update Index Data

on:
  schedule:
    - cron: '30 10 * * 1'  # 4pm IST, Mondays (after NSE closes at 3:30pm)
  workflow_dispatch:           # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch index data
        run: python scripts/automated_index_fetcher.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "index data/"
          git diff --cached --quiet || git commit -m "chore: index update $(date +'%Y-%m-%d')"
          git push
